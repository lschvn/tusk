name: release

# Build prebuilt `tusk` binaries for the supported platforms and publish them
# as assets on a GitHub Release. `install.sh` downloads these assets.
#
# Trigger by pushing a version tag (e.g. `git push origin v0.1.0`) or by running
# this workflow manually from the Actions tab.
#
# Build notes:
# - `tusk` links dynamically against libcurl + libssl + libarchive (system libs).
# - The `curl-sys` build script invokes `pkg-config` to locate these libraries,
#   so the matching `-dev` packages must be installed before `cargo build`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists; reusing it."
            else
              git tag -a "${tag}" -m "tusk ${tag}"
              git push origin "refs/tags/${tag}"
            fi
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tusk-x86_64-unknown-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tusk-x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libarchive-dev \
            pkg-config

      - name: Install Rust (stable) + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --bin tusk --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: |
          BIN="target/${{ matrix.target }}/release/tusk"
          strip "${BIN}"
          ls -la "${BIN}"

      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: |
          BIN="target/${{ matrix.target }}/release/tusk"
          strip "${BIN}"
          ls -la "${BIN}"

      - name: Package tarball
        run: |
          set -euo pipefail
          STAGE="stage-${{ matrix.archive }}"
          mkdir -p "${STAGE}"
          BIN="target/${{ matrix.target }}/release/tusk"
          cp "${BIN}" "${STAGE}/tusk"
          chmod +x "${STAGE}/tusk"
          cp README.md "${STAGE}/"
          cp LICENSE "${STAGE}/" 2>/dev/null || true
          tar -C "${STAGE}" -czf "${{ matrix.archive }}.tar.gz" .
          sha256sum "${{ matrix.archive }}.tar.gz" > "${{ matrix.archive }}.tar.gz.sha256"
          ls -la "${{ matrix.archive }}.tar.gz"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            ${{ matrix.archive }}.tar.gz
            ${{ matrix.archive }}.tar.gz.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
