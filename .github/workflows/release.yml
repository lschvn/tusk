name: release

# Build prebuilt `tusk` binaries for every supported platform and publish them
# as assets on a GitHub Release whenever a version tag (e.g. v0.1.0) is pushed.
# These assets are what `install.sh` downloads.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  upload-assets:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Builds with `cross` when cross-compilation is required (musl, aarch64),
      # produces tusk-<target>.tar.gz plus a matching .sha256, and uploads both
      # to the release for the pushed tag (creating it if necessary).
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: tusk
          target: ${{ matrix.target }}
          archive: $bin-$target
          tar: unix
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
